  <body>
    <header><h1>ULTRA COUNTER</h1></header>

    <!-- Counter Card  -->

    <main id="counter-wrapper">
      <h2 id="counter-display">0</h2>

      <section class="button-container">
        <!-- Plus Button  -->
        <div class="control-item" style="grid-area: plusBtn">
          <button id="plusBtn" title="Increase">
            <i class="bi bi-plus-circle"></i>
          </button>
        </div>

        <!-- Minus Button  -->
        <div class="control-item" style="grid-area: minusBtn">
          <button id="minusBtn" title="Decrease">
            <i class="bi bi-dash-circle"></i>
          </button>
        </div>

        <!-- Reset Button  -->
        <button id="reset-button" title="Reset Counter">
          <i class="bi bi-arrow-counterclockwise"></i>
        </button>
      </section>
    </main>
